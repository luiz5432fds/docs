name: xps10_ai_workstation
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.2
  cloud_firestore: ^5.4.4
  cloud_functions: ^5.1.3
  firebase_storage: ^12.3.2
  provider: ^6.1.2
  # MIDI export/import
  midi: ^1.0.2
  # XML parsing for MusicXML
  xml: ^6.5.0
  # File picker for import dialogs
  file_picker: ^8.1.2
  # Path provider for file operations
  path_provider: ^2.1.4
  # Share functionality for exporting
  share_plus: ^10.0.0
  # Audio export
  flutter_sound: ^9.6.0
  permission_handler: ^11.3.1
  # HTTP client for AI Maestro API
  http: ^1.2.0
  # Path manipulation
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
